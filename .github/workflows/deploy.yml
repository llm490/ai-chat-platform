name: Deploy

on:
  push:
    branches:
      - main  # 如果你本地是 master，请改为 master

# 必须显式声明权限，否则 Action 无法推送代码到 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级到 v4 消除警告

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # 升级到 v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4 # 升级到 v4
        with:
          node-version: 24 # 直接使用 Node 24 消除过时警告
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          # 关键：自动引用 GitHub 系统生成的令牌进行身份验证
          token: ${{ secrets.GITHUB_TOKEN }}